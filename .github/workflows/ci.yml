name: CI - Build and Test

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop

jobs:
  # ==================== SECURITY CHECK ====================
  security-check:
    name: 🔒 Security Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for .env files in repo
        run: |
          if git ls-files | grep -q '\.env$'; then
            echo "::error::¡ALERTA DE SEGURIDAD! Archivos .env encontrados en el repositorio"
            git ls-files | grep '\.env$'
            exit 1
          fi
          echo "✅ No hay archivos .env trackeados"

      - name: Scan for secrets (API keys, passwords)
        run: |
          echo "Buscando patrones de secretos..."
          PATTERNS=(
            "api[_-]?key[[:space:]]*[:=]"
            "password[[:space:]]*[:=]"
            "secret[[:space:]]*[:=]"
            "token[[:space:]]*[:=]"
            "private[_-]?key"
          )

          FOUND=false
          for pattern in "${PATTERNS[@]}"; do
            if git grep -i "$pattern" -- '*.env*' '*.yml' '*.yaml' '*.json' '*.properties' 2>/dev/null; then
              FOUND=true
            fi
          done

          if [ "$FOUND" = true ]; then
            echo "::warning::Posibles secretos encontrados. Verifica que no sean valores de ejemplo."
          else
            echo "✅ No se encontraron patrones sospechosos obvios"
          fi

  # ==================== BACKEND BUILD & TEST ====================
  backend-auth-build:
    name: 🔨 Build Auth Backend
    runs-on: ubuntu-latest
    needs: security-check
    defaults:
      run:
        working-directory: ./backend/auth

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env from example (placeholders)
        run: cp .env.example .env

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build and test with Maven
        run: mvn clean package -B

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: auth-service-jar
          path: backend/auth/target/*.jar
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auth-test-results
          path: backend/auth/target/surefire-reports/
          retention-days: 7

  # ==================== FRONTEND BUILD ====================
  frontend-build:
    name: 🎨 Build Frontend
    runs-on: ubuntu-latest
    needs: security-check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: frontend/pymes/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/pymes/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        working-directory: ./frontend/pymes
        run: npm ci

      - name: Lint
        working-directory: ./frontend/pymes
        run: npm run lint

      - name: Build
        working-directory: ./frontend/pymes
        run: npx quasar build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/pymes/dist/
          retention-days: 7

  # ==================== DOCKER BUILD (Optional) ====================
  docker-build-check:
    name: 🐳 Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-auth-build, frontend-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Auth Docker image (test)
        run: |
          docker build -t pymes-auth-test ./backend/auth

      - name: Build Frontend Docker image (test)
        run: |
          docker build -t pymes-frontend-test ./frontend/pymes

      - name: Cleanup
        run: |
          docker rmi pymes-auth-test pymes-frontend-test || true
