name: repo-check

on:
  push:
    branches:
      - main

jobs:
  check-structure:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: show repository structure
        run: |
          echo "root:"
          ls -la
          echo ""
          echo "frontend:"
          ls -la frontend
          echo ""
          echo "backend:"
          ls -la backend
