name: 🚀 CD - Deploy to Production
run-name: Deploy prod de ${{ github.ref_name }} por @${{ github.actor }}

on:
  push:
    branches:
      - main
  
  # Manual trigger with approval
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g., v1.0.0)'
        required: true
        default: 'latest'

jobs:
  # ==================== BUILD & TEST ====================
  build-and-test:
    name: 🔨 Build and Test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Create .env from example (placeholders)
        working-directory: ./backend/auth
        run: cp .env.example .env

      - name: Build Auth Backend
        working-directory: ./backend/auth
        run: mvn clean package -DskipTests -B

      - name: Run Auth Tests
        working-directory: ./backend/auth
        run: mvn test -B

      - name: Build Gateway Backend
        working-directory: ./backend/gateway-pymes
        run: mvn clean package -DskipTests -B

      - name: Run Gateway Tests
        working-directory: ./backend/gateway-pymes
        run: mvn test -B

      - name: Generate version
        id: version
        run: echo "version=$(date +%Y%m%d)-${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Upload Auth JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: auth-service-jar
          path: backend/auth/target/*.jar
          retention-days: 7

      - name: Upload Gateway JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: gateway-service-jar
          path: backend/gateway-pymes/target/*.jar
          retention-days: 7

  # ==================== FRONTEND BUILD ====================
  frontend-build:
    name: 🎨 Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./frontend/pymes
        run: npm ci

      - name: Build Quasar
        working-directory: ./frontend/pymes
        run: npx quasar build

  # ==================== DOCKER BUILD & PUSH ====================
  docker-build:
    name: 🐳 Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: [build-and-test, frontend-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Auth image (Production)
        uses: docker/build-push-action@v5
        with:
          context: ./backend/auth
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/pymes-auth:latest
            ${{ secrets.DOCKER_USERNAME }}/pymes-auth:prod
            ${{ secrets.DOCKER_USERNAME }}/pymes-auth:${{ needs.build-and-test.outputs.version }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/pymes-auth:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/pymes-auth:buildcache,mode=max

      - name: Build and push Gateway image (Production)
        uses: docker/build-push-action@v5
        with:
          context: ./backend/gateway-pymes
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/pymes-gateway:latest
            ${{ secrets.DOCKER_USERNAME }}/pymes-gateway:prod
            ${{ secrets.DOCKER_USERNAME }}/pymes-gateway:${{ needs.build-and-test.outputs.version }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/pymes-gateway:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/pymes-gateway:buildcache,mode=max

      - name: Build and push Frontend image (Production)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/pymes
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/pymes-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/pymes-frontend:prod
            ${{ secrets.DOCKER_USERNAME }}/pymes-frontend:${{ needs.build-and-test.outputs.version }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/pymes-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/pymes-frontend:buildcache,mode=max

  # ==================== DEPLOY TO PRODUCTION ====================
  deploy-production:
    name: 🚀 Deploy to Production Server
    runs-on: ubuntu-latest
    needs: [build-and-test, docker-build]
    environment:
      name: production
      url: https://pymes-admin.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH (if configured)
        if: secrets.PROD_HOST != '' && secrets.PROD_USER != '' && secrets.PROD_SSH_KEY != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: 22
          script: |
            set -e
            echo "📍 Deploying version: ${{ needs.build-and-test.outputs.version }}"

            cd ~/pymes-admin
            git pull origin main

            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            export TAG=${{ needs.build-and-test.outputs.version }}

            # Usar docker-compose en la raíz
            docker compose -f docker-compose.yml pull
            docker compose -f docker-compose.yml up -d

            echo "✅ Deploy to Production completed successfully!"

      - name: Skip deployment (secrets not configured)
        if: secrets.PROD_HOST == '' || secrets.PROD_USER == '' || secrets.PROD_SSH_KEY == ''
        run: |
          echo "⚠️ Production server secrets not configured. Skipping SSH deployment."
          echo "📦 Docker images were built and pushed successfully."
          echo "🔧 To enable full deploy, configure PROD_HOST, PROD_USER and PROD_SSH_KEY secrets."

      - name: Notify success
        if: success()
        run: |
          echo "✅ Production build and docker push successful!"
          echo "📍 Version: ${{ needs.build-and-test.outputs.version }}"
