name: CD - Deploy to Staging

on:
  push:
    branches:
      - develop

jobs:
  # ==================== BUILD & TEST ====================
  build-and-test:
    name: 🔨 Build and Test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Create .env from example (placeholders)
        working-directory: ./backend/auth
        run: cp .env.example .env

      - name: Build Auth Backend
        working-directory: ./backend/auth
        run: mvn clean package -DskipTests -B

      - name: Run Tests
        working-directory: ./backend/auth
        run: mvn test -B

      - name: Generate version
        id: version
        run: echo "version=$(date +%Y%m%d)-${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: auth-service-jar
          path: backend/auth/target/*.jar
          retention-days: 1

  # ==================== FRONTEND BUILD ====================
  frontend-build:
    name: 🎨 Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./frontend/pymes
        run: npm ci

      - name: Build Quasar
        working-directory: ./frontend/pymes
        run: npx quasar build

  # ==================== DOCKER BUILD & PUSH ====================
  docker-build-push:
    name: 🐳 Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: [build-and-test, frontend-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Auth image (Staging)
        uses: docker/build-push-action@v5
        with:
          context: ./backend/auth
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/pymes-auth:staging
            ${{ secrets.DOCKER_USERNAME }}/pymes-auth:${{ needs.build-and-test.outputs.version }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/pymes-auth:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/pymes-auth:buildcache,mode=max

      - name: Build and push Frontend image (Staging)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/pymes
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/pymes-frontend:staging
            ${{ secrets.DOCKER_USERNAME }}/pymes-frontend:${{ needs.build-and-test.outputs.version }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/pymes-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/pymes-frontend:buildcache,mode=max

  # ==================== DEPLOY TO STAGING ====================
  deploy-staging:
    name: 🚀 Deploy to Staging Server
    runs-on: ubuntu-latest
    needs: [build-and-test, docker-build-push]
    environment:
      name: staging
      url: http://staging.pymes-admin.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: 22
          script: |
            set -e

            echo "📍 Deploying to Staging Environment..."
            echo "📍 Version: ${{ needs.build-and-test.outputs.version }}"

            cd ~/pymes-admin

            # Pull latest changes
            git pull origin develop

            # Stop existing containers
            docker compose -f docker-compose.yml down

            # Pull new images
            docker compose -f docker-compose.yml pull

            # Start services
            docker compose -f docker-compose.yml up -d

            # Wait for services to be healthy
            echo "⏳ Waiting for services to start..."
            sleep 30

            # Check health
            docker compose -f docker-compose.yml ps

            # Cleanup old images
            docker image prune -f --filter "until=24h"

            echo "✅ Deploy to Staging completed!"

      - name: Verify deployment
        run: |
          echo "Deployment completed. Check staging environment."
