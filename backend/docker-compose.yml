services:
  # ==================== DATABASE (Auth Microservice) ====================
  postgres-auth:
    image: postgres:15-alpine
    container_name: pymes-postgres-auth
    env_file:
      - auth/.env
    environment:
      POSTGRES_DB: ${DB_NAME:-pymes_auth}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5435:5432" # Puerto externo 5435, interno 5432
    networks:
      - pymes-network

  # ==================== CACHE (Redis for JWT/Sessions) ====================
  redis:
    image: redis:7-alpine
    container_name: pymes-redis-auth
    ports:
      - "6379:6379"
    networks:
      - pymes-network

  # ==================== AUTH SERVICE ====================
  auth-service:
    build:
      context: ./auth
      dockerfile: Dockerfile
    container_name: pymes-auth-service
    ports:
      - "${SERVER_PORT:-8081}:8081"
    environment:
      - DB_HOST=postgres-auth
      - DB_PORT=5432
      - REDIS_HOST=redis
    env_file:
      - auth/.env
    depends_on:
      - postgres-auth
      - redis
    networks:
      - pymes-network

networks:
  pymes-network:
    driver: bridge
